<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Share - Compartilhamento Seguro de Arquivos</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>📱 P2P Share</h1>

    <img id="qr" alt="QR Code para conectar outro dispositivo" loading="lazy">
    <p id="link" aria-live="polite"></p>

    <h2>Dispositivos Conectados</h2>
    <ul id="users" role="listbox" aria-label="Lista de dispositivos disponíveis"></ul>

    <button id="connectBtn" aria-label="Conectar ao dispositivo selecionado">🔗 Conectar</button>

    <p id="status" role="status" aria-live="polite" aria-atomic="true">🔴 Não conectado</p>

    <div>
        <input type="file" id="fileInput" disabled aria-label="Selecionar arquivo para compartilhar">
        <progress id="progress" value="0" max="100" aria-label="Progresso da transferência do arquivo"></progress>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
